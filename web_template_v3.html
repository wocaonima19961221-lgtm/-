<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>加密市场情报分析</title>
<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0d1117;--bg2:#161b22;--card:#1c2333;--card2:#252d3f;
  --accent:#3b82f6;--accent2:#2563eb;--green:#22c55e;--red:#ef4444;--yellow:#eab308;
  --text:#e6edf3;--text2:#8b949e;--text3:#5c6570;--border:#2d3548;--border2:#3d4760;
  --shadow:0 4px 24px rgba(0,0,0,0.3);--radius:12px;--radius-sm:8px;
}
[data-theme="light"]{--bg:#f5f7fa;--bg2:#ffffff;--card:#ffffff;--card2:#f0f2f5;--accent:#3b82f6;--accent2:#2563eb;--green:#16a34a;--red:#dc2626;--yellow:#ca8a04;--text:#1f2937;--text2:#6b7280;--text3:#9ca3af;--border:#e5e7eb;--border2:#d1d5db;--shadow:0 4px 24px rgba(0,0,0,0.06);}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;}

/* ===== Scrollbar ===== */
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}::-webkit-scrollbar-thumb:hover{background:var(--text3);}

/* ===== Top Nav ===== */
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:60px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;position:relative;}
.nav-l{display:flex;align-items:center;gap:32px;}
.nav-logo{font-size:18px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px;}
.nav-links{display:flex;gap:4px;}
.nav-links a{padding:6px 14px;border-radius:6px;font-size:13px;color:var(--text2);text-decoration:none;cursor:pointer;transition:all 0.15s;}
.nav-links a:hover{color:var(--text);background:var(--card);}
.nav-links a.active{color:var(--text);background:var(--card);}
.nav-r{display:flex;gap:8px;}
.nav-btn{padding:7px 18px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all 0.15s;}
.nav-btn.primary{background:var(--accent);color:white;}
.nav-btn.primary:hover{background:var(--accent2);}
.nav-btn.ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.nav-btn.ghost:hover{color:var(--text);border-color:var(--text3);}

/* ===== Tab Bar ===== */
.tabs{display:flex;padding:0 28px;background:var(--bg2);border-bottom:1px solid var(--border);gap:0;}
.tab{padding:11px 22px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;transition:all 0.15s;display:flex;align-items:center;gap:6px;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ===== Main Layout ===== */
.layout{display:grid;grid-template-columns:280px 1fr 300px;height:calc(100vh - 100px);overflow:hidden;}

/* ===== LEFT SIDEBAR ===== */
.left{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;max-height:calc(100vh - 100px);}
.left .search-wrap{padding:14px 14px 10px;border-bottom:1px solid var(--border);}
.left .search-wrap input{width:100%;padding:9px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;outline:none;transition:border 0.15s;}
.left .search-wrap input:focus{border-color:var(--accent);}
.left .search-wrap input::placeholder{color:var(--text3);}
.mobile-picker-head{display:none;}
.cats{display:flex;gap:3px;padding:8px 10px 6px;flex-wrap:wrap;border-bottom:1px solid var(--border);}
.cat{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;background:var(--card);color:var(--text2);border:none;transition:all 0.12s;}
.cat:hover{color:var(--text);}
.cat.active{background:var(--accent);color:white;}
.sort-bar{display:flex;gap:3px;padding:4px 10px 6px;border-bottom:1px solid var(--border);}
.sort-btn{padding:3px 8px;border-radius:4px;font-size:10px;cursor:pointer;background:var(--card);color:var(--text2);border:none;transition:all 0.12s;}
.sort-btn:hover{color:var(--text);}
.sort-btn.active{background:var(--accent);color:white;}
.list-header{display:grid;grid-template-columns:1fr 80px 70px;padding:7px 14px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);}
.list-header span:nth-child(2),.list-header span:nth-child(3){text-align:center;}
.coin-list{flex:1;overflow-y:auto;}
.coin-row{display:grid;grid-template-columns:1fr 80px 70px;padding:8px 14px;font-size:12px;cursor:pointer;border-bottom:1px solid rgba(45,53,72,0.4);transition:background 0.12s;align-items:center;}
.coin-row:hover{background:var(--card);}
.coin-row.active{background:rgba(59,130,246,0.08);border-left:2px solid var(--accent);}
.coin-row .name{font-weight:500;display:flex;align-items:center;gap:6px;overflow:hidden;line-height:18px;}
.coin-row .name img{width:18px;height:18px;border-radius:50%;flex-shrink:0;display:block;}
.coin-badge{border-radius:50%;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#334155,#0f172a);border:1px solid var(--border2);color:var(--text);font-weight:800;font-family:'Inter',sans-serif;letter-spacing:0;}
.coin-badge-sm{width:18px;height:18px;font-size:8px;}
.coin-badge-md{width:20px;height:20px;font-size:8px;}
.coin-badge-lg{width:26px;height:26px;font-size:10px;margin:0 auto 6px;}
.coin-row .name .cn{color:var(--text3);font-weight:400;font-size:10px;margin-left:2px;}
.coin-row .prc{text-align:center;font-family:'SF Mono',monospace;font-size:12px;font-weight:500;line-height:18px;}
.coin-row .chg{text-align:center;font-weight:600;font-size:12px;line-height:18px;}
.coin-row .chg.up{color:var(--green);}
.coin-row .chg.down{color:var(--red);}

/* ===== CENTER ===== */
.center{padding:16px 20px;overflow-y:auto;background:var(--bg);}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow);}
.chart-head-main{display:flex;align-items:center;gap:10px;min-width:0;flex-wrap:wrap;}
.chart-head-main h2{font-size:18px;font-weight:800;letter-spacing:0;white-space:nowrap;}
.chart-head-main .badge{font-size:12px;padding:3px 10px;border-radius:5px;font-weight:600;}
.chart-head-main .stat{font-size:11px;color:var(--text3);background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-family:'SF Mono',monospace;white-space:nowrap;}
.chart-head-main .stat strong{color:var(--text);font-weight:800;}
.badge.bull{background:rgba(34,197,94,0.12);color:var(--green);}
.badge.bear{background:rgba(239,68,68,0.12);color:var(--red);}
.badge.neutral{background:rgba(139,148,158,0.12);color:var(--text2);}
.chart-head-actions{display:flex;gap:8px;align-items:center;flex-shrink:0;}
.back-btn{background:var(--card2);border:1px solid var(--border);border-radius:7px;color:var(--text2);padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.12s;white-space:nowrap;}
.back-btn:hover{color:var(--text);border-color:var(--border2);}
.price-row{display:flex;align-items:baseline;gap:12px;margin-bottom:10px;}
.price-row .main-price{font-size:30px;font-weight:700;font-family:'SF Mono',monospace;letter-spacing:-0.5px;}
.price-row .change{font-size:15px;font-weight:600;}
.stats-row{display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap;}
.stats-row .stat{font-size:12px;color:var(--text2);background:var(--card);padding:5px 12px;border-radius:6px;}
.stats-row .stat strong{color:var(--text);font-weight:600;}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:8px;margin-bottom:14px;box-shadow:var(--shadow);}
.chart-card #chart{height:340px;}
.chart-tools{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:9px 10px;box-shadow:var(--shadow);}
.tf-bar{display:flex;gap:6px;flex-wrap:wrap;}
.tf-btn{min-width:42px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--text2);font-size:12px;font-weight:700;font-family:'SF Mono',monospace;cursor:pointer;transition:all 0.12s;}
.tf-btn:hover{color:var(--text);border-color:var(--border2);}
.tf-btn.active{background:var(--accent);border-color:var(--accent);color:white;}
.chart-tools .hint{font-size:11px;color:var(--text3);white-space:nowrap;}
.sig-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow);}
.sig-card .sig-l{display:flex;align-items:center;gap:14px;}
.sig-card .sig-l .dir{font-size:20px;font-weight:700;}
.sig-card .sig-l .meta{font-size:12px;color:var(--text2);margin-top:2px;}
.sig-card .sig-r{text-align:right;}
.sig-card .sig-r .price-big{font-size:22px;font-weight:700;font-family:'SF Mono',monospace;margin-bottom:6px;}
.sl-tp{display:flex;gap:20px;}
.sl,.tp{font-size:14px;font-weight:600;}
.sl{color:var(--red);}.tp{color:var(--green);}
.sl-tp .sub{font-size:11px;color:var(--text3);}
.reason-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);}
.reason-card .r{font-size:13px;padding:4px 0;display:flex;align-items:center;gap:6px;}
.reason-card .bull{color:var(--green);}
.reason-card .bear{color:var(--red);}
.trade-plan{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow);}
.trade-plan-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.trade-plan-title{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:800;}
.trade-plan-title .dot{width:12px;height:12px;border-radius:50%;background:var(--text3);box-shadow:0 0 0 5px rgba(139,148,158,0.12);}
.trade-plan-title.bull{color:var(--green);}
.trade-plan-title.bull .dot{background:var(--green);box-shadow:0 0 0 5px rgba(34,197,94,0.12);}
.trade-plan-title.bear{color:var(--red);}
.trade-plan-title.bear .dot{background:var(--red);box-shadow:0 0 0 5px rgba(239,68,68,0.12);}
.trade-plan-title.neutral{color:var(--yellow);}
.trade-plan-title.neutral .dot{background:var(--yellow);box-shadow:0 0 0 5px rgba(234,179,8,0.12);}
.trade-plan-price{font-size:22px;font-weight:800;font-family:'SF Mono',monospace;text-align:right;}
.trade-plan-grid{display:grid;grid-template-columns:1fr 1.15fr;gap:16px;}
.trade-block{background:rgba(37,45,63,0.55);border:1px solid rgba(61,71,96,0.55);border-radius:8px;padding:12px 14px;min-width:0;}
.trade-block h3{font-size:13px;margin-bottom:10px;color:var(--text);letter-spacing:0;}
.trade-line{display:grid;grid-template-columns:94px minmax(0,1fr);gap:10px;font-size:13px;line-height:1.7;padding:2px 0;}
.trade-line .label{color:var(--text3);font-weight:600;}
.trade-line .value{color:var(--text);font-weight:700;word-break:break-word;}
.prob-row{display:grid;grid-template-columns:94px minmax(0,1fr) 42px;gap:10px;align-items:center;font-size:13px;padding:5px 0;}
.prob-row .label{color:var(--text3);font-weight:600;}
.prob-bar{height:7px;border-radius:999px;background:var(--border);overflow:hidden;}
.prob-fill{height:100%;border-radius:999px;background:var(--text3);}
.prob-fill.long{background:var(--green);}
.prob-fill.short{background:var(--red);}
.prob-fill.wait{background:var(--yellow);}
.prob-num{text-align:right;font-family:'SF Mono',monospace;font-weight:800;}
.judgement-list{margin:0;padding-left:18px;color:var(--text);font-size:13px;line-height:1.75;}
.judgement-list li{padding:2px 0;}
@media(max-width:1100px){.trade-plan-grid{grid-template-columns:1fr}.trade-plan-head{align-items:flex-start;flex-direction:column}.trade-plan-price{text-align:left}}
.data-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px;box-shadow:var(--shadow);}
.dp-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.dp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.dp-item{background:var(--card2);border-radius:6px;padding:8px 10px;display:flex;flex-direction:column;}
.dp-l{font-size:10px;color:var(--text3);margin-bottom:3px;}
.dp-v{font-size:13px;font-weight:600;font-family:'SF Mono',monospace;}
.home-dash{min-height:100%;display:flex;flex-direction:column;gap:14px;overflow:hidden;}
.home-hero{display:grid;grid-template-columns:minmax(420px,1.1fr) minmax(260px,0.9fr);gap:14px;align-items:stretch;}
.home-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;min-width:0;}
.home-title{height:28px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;}
.home-title h2{font-size:17px;line-height:1.2;letter-spacing:0;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.home-title span{font-size:11px;color:var(--text3);font-family:'SF Mono',monospace;white-space:nowrap;}
.pulse-dot{display:inline-flex;align-items:center;gap:7px;color:var(--green)!important;font-weight:700;}
.pulse-dot::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 5px rgba(34,197,94,0.12);}
.home-metrics{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;}
.home-metric{height:58px;background:var(--card2);border:1px solid rgba(61,71,96,0.6);border-radius:8px;padding:8px 10px;min-width:0;overflow:hidden;display:grid;grid-template-columns:74px minmax(0,1fr);align-items:center;gap:10px;}
.home-metric .k{font-size:11px;color:var(--text3);line-height:16px;}
.home-metric .v{font-size:17px;font-weight:800;font-family:'SF Mono',monospace;white-space:nowrap;overflow:visible;text-overflow:clip;letter-spacing:0;font-variant-numeric:tabular-nums;}
.home-metric .s{font-size:11px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.home-metric-main{min-width:0;}
.breadth-wrap{display:flex;flex-direction:column;gap:10px;}
.breadth-bar{height:12px;border-radius:999px;overflow:hidden;background:var(--border);display:flex;}
.breadth-up{height:100%;background:linear-gradient(90deg,var(--green),#86efac);}
.breadth-down{height:100%;background:linear-gradient(90deg,#fb7185,var(--red));}
.breadth-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);}
.home-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;}
.rank-list{display:flex;flex-direction:column;gap:7px;}
.rank-item{height:56px;display:grid;grid-template-columns:minmax(0,1fr) 74px;gap:10px;align-items:center;border:1px solid rgba(61,71,96,0.55);background:rgba(37,45,63,0.55);border-radius:8px;padding:8px 10px;cursor:pointer;transition:background 0.12s,border-color 0.12s;}
.rank-item:hover{background:var(--card2);border-color:var(--border2);}
.rank-name{display:grid;grid-template-columns:20px minmax(0,1fr);align-items:center;gap:8px;min-width:0;font-size:13px;font-weight:700;overflow:hidden;}
.rank-name img{width:20px;height:20px;border-radius:50%;flex-shrink:0;display:block;}
.rank-copy{min-width:0;overflow:hidden;}
.rank-copy strong{display:block;font-size:13px;line-height:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rank-copy small{display:block;font-size:11px;line-height:15px;color:var(--text3);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rank-val{font-size:13px;font-weight:800;font-family:'SF Mono',monospace;text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums;}
.rank-val.up{color:var(--green);}
.rank-val.down{color:var(--red);}
.quick-coins{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;}
.quick-coin{height:82px;border:1px solid var(--border);background:var(--card);border-radius:8px;padding:9px 8px;cursor:pointer;text-align:center;transition:background 0.12s,border-color 0.12s;overflow:hidden;}
.quick-coin:hover{background:var(--card2);border-color:var(--border2);}
.quick-coin img{width:26px;height:26px;border-radius:50%;margin:0 auto 6px;display:block;}
.quick-coin .q-s{font-size:12px;font-weight:800;}
.quick-coin .q-p{font-size:11px;color:var(--text2);font-family:'SF Mono',monospace;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-variant-numeric:tabular-nums;}
.quick-coin .q-c{font-size:11px;font-weight:700;margin-top:2px;font-variant-numeric:tabular-nums;}
.opportunity-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;}
.opp-list{display:flex;flex-direction:column;gap:8px;}
.opp-item{height:64px;display:grid;grid-template-columns:minmax(0,1fr) 86px;gap:12px;align-items:center;border:1px solid rgba(61,71,96,0.55);background:rgba(37,45,63,0.55);border-radius:8px;padding:9px 11px;cursor:pointer;transition:background 0.12s,border-color 0.12s;}
.opp-item:hover{background:var(--card2);border-color:var(--border2);}
.opp-main{display:grid;grid-template-columns:24px minmax(0,1fr);gap:9px;align-items:center;min-width:0;}
.opp-main img{width:24px;height:24px;border-radius:50%;display:block;}
.opp-copy{min-width:0;overflow:hidden;}
.opp-copy strong{display:block;font-size:13px;line-height:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.opp-copy small{display:block;font-size:11px;color:var(--text3);line-height:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.opp-side{text-align:right;min-width:0;}
.opp-prob{font-size:16px;font-weight:900;font-family:'SF Mono',monospace;line-height:20px;font-variant-numeric:tabular-nums;}
.opp-prob.up{color:var(--green);}.opp-prob.down{color:var(--red);}
.opp-meta{font-size:11px;color:var(--text3);font-family:'SF Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-variant-numeric:tabular-nums;}
@media(max-width:1180px){.home-hero,.home-grid,.opportunity-grid{grid-template-columns:1fr}.quick-coins{grid-template-columns:repeat(3,1fr)}}

@media(max-width:900px){
  body{overflow:auto;}
  .nav{height:54px;padding:0 14px;position:fixed;top:0;left:0;right:0;z-index:170;}
  .nav-l{justify-content:flex-start;text-align:left!important;}
  .nav-logo{font-size:20px!important;}
  .nav-r{right:14px!important;}
  .nav-btn{padding:6px 10px;font-size:12px;}
  .tabs{position:fixed;top:54px;left:0;right:0;z-index:160;padding:0 12px;overflow-x:auto;}
  .tab{padding:10px 12px;font-size:12px;white-space:nowrap;}
  .layout{display:flex;flex-direction:column;height:auto;min-height:calc(100vh - 136px);overflow:visible;padding-top:94px;}
  .left{order:1;border-right:0;border-top:0;border-bottom:1px solid var(--border);max-height:none;height:auto;overflow:visible;position:static;padding-top:0;background:var(--bg2);}
  .center{order:2;padding:12px;background:var(--bg);overflow:visible;}
  .right{order:3;border-left:0;border-top:1px solid var(--border);padding:12px;overflow:visible;}
  .center::before,.right::before{display:block;padding:10px 12px 8px;color:var(--text);font-size:13px;font-weight:800;letter-spacing:0;border-bottom:1px solid var(--border);background:var(--bg2);}
  .center::before{content:"2 分析推荐 / 交易方向";margin:-12px -12px 12px;}
  .right::before{content:"3 快讯与市场情绪";margin:-12px -12px 12px;}
  .right #rightPlaceholder{display:none;}
  .mobile-picker-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px 8px;color:var(--text);border-bottom:1px solid var(--border);background:var(--bg2);box-shadow:none;}
  .mobile-picker-title{font-size:13px;font-weight:800;white-space:nowrap;}

<script>
// ====== Config ======
const CMC_IDS={BTC:1,ETH:1027,USDT:825,USDC:3408,BNB:1839,SOL:5426,XRP:52,ADA:2010,DOGE:74,DOT:6636,SHIB:5994,TRX:1958,AVAX:5805,UNI:7083,LINK:1975,TON:11419,ATOM:3794,ETC:1321,XLM:512,BCH:1831,ALGO:4030,VET:3077,FIL:2280,NEAR:6535,ICP:8916,APT:21794,ARB:11841,OP:11840,SUI:20947,PEPE:24478,FLOKI:10804,AAVE:7278,CRV:6538,MKR:1518,COMP:5692,LTC:2,XMR:328,ZEC:1437,DASH:131,EOS:1765,WAVES:4847,KSM:5034,XTZ:2011,ZIL:2469,IOTA:1720,NEO:1376,SAND:6210,MANA:1966,AXS:6783,GALA:7080,ENJ:2130,CHZ:4066,WLD:13502,BLUR:23121,TIA:22861,SEI:23149,INJ:7226,RUNE:4157,FTM:3513,EGLD:6892,HBAR:4642,KAS:20396,MINA:8646,FLOW:4558,KAVA:4846,FET:3773,GRT:6719,ENS:13855,TAO:22974,ONDO:21159,JUP:29210,PYTH:28177,STRK:22691,ENA:30171,WIF:28752,BONK:23095,ORDI:25028,NOT:28850,PEOPLE:14806,LDO:8000,IMX:10603,RENDER:5690,AR:5632,STX:4847};
function baseSym(s){return String(s||'').replace('-USDT','').toUpperCase();}
function logoSources(sym){const b=baseSym(sym),lo=b.toLowerCase(),id=CMC_IDS[b],arr=[];if(id)arr.push(`https://s2.coinmarketcap.com/static/img/coins/64x64/${id}.png`);arr.push(`https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/32/color/${lo}.png`);arr.push(`https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/32/icon/${lo}.png`);return arr;}
function logo(s){return logoSources(s)[0];}
function iconHtml(sym,cls){const b=baseSym(sym);return`<img class="coin-badge ${cls}" src="${logoSources(b)[0]}" data-symbol="${b}" data-i="0" onerror="fallbackIcon(this)">`;}
function fallbackIcon(img){const b=img.dataset.symbol,src=logoSources(b),i=(+img.dataset.i||0)+1;if(i<src.length){img.dataset.i=i;img.src=src[i];return;}const sp=document.createElement('span');sp.className=img.className;sp.textContent=b.slice(0,Math.min(3,b.length));img.replaceWith(sp);}
const CN={BTC:'比特币',ETH:'以太坊',SOL:'Solana',XRP:'瑞波币',ADA:'艾达币',DOGE:'狗狗币',SHIB:'柴犬币',LTC:'莱特币',XMR:'门罗币',ZEC:'大零币',BNB:'币安币',PEPE:'Pepe',UNI:'Uniswap',FIL:'Filecoin',ATOM:'Cosmos',BCH:'比特币现金',SAND:'The Sandbox',MANA:'Decentraland',AXS:'Axie Infinity',WLD:'Worldcoin',TSLA:'特斯拉',AAPL:'苹果',SPY:'标普500 ETF',QQQ:'纳指100 ETF',TSM:'台积电',MSTR:'Strategy',AMZN:'亚马逊',COIN:'Coinbase',PLTR:'Palantir',CRCL:'Circle',LLY:'礼来',NVO:'诺和诺德',BB:'黑莓',NOK:'诺基亚',EWT:'台湾ETF',ASTS:'AST SpaceMobile',NVDA:'英伟达',MSFT:'微软',META:'Meta',GOOGL:'谷歌',AMD:'AMD',NFLX:'奈飞'};
function cn(s){return CN[s.replace('-USDT','')]||'';}
function getCat(c){const b=c.symbol.replace('-USDT','');const v=c.turnover_24h;if(c.market_type==='stock_perp')return{i:'🇺🇸',id:'stock'};
if(['DOGE','SHIB','PEPE','FLOKI','BONK','WIF'].includes(b))return{i:'🤑',id:'meme'};
if(v>=5e6&&['BTC','ETH','SOL','BNB','XRP','ADA','DOT','LINK','AVAX','UNI','LTC','XMR','ZEC','ATOM','ETC','XLM','TRX','NEAR','APT','SUI','FIL','AAVE','INJ','SEI','RUNE','FTM','KAS'].includes(b))return{i:'💎',id:'major'};
if(v>=5e5)return{i:'🪙',id:'alt'};return{i:'🔹',id:'micro'};}
const CATS=[{i:'📋',l:'全部',id:'all'},{i:'🇺🇸',l:'美股永续',id:'stock'},{i:'💎',l:'主流',id:'major'},{i:'🤑',l:'Meme',id:'meme'},{i:'🪙',l:'山寨',id:'alt'},{i:'🔹',l:'微型',id:'micro'}];
const KLINE_TYPES=[['1min','1m'],['5min','5m'],['15min','15m'],['30min','30m'],['1hour','1h'],['4hour','4h'],['1day','1D']];
const MTF_TYPES=['15min','30min','1hour','4hour'];
let activeCat='all',sortBy='vol',allC=[],sel=null,kCache={},kCacheTs={},newsCache=[],isKlineLoading=false,isContractsLoading=false,homeRanks=null,homeRanksTs=0,lastListKey='',renderedSymbols=[],activeTf='1min';
function fmt(p){if(p==null)return'-';if(p>=1000)return Number(p).toLocaleString('en-US',{minFD:2,maxFD:2});return Number(p).toFixed(p<1?6:2);}
function fmtV(v){if(!v)return'-';if(v>=1e9)return(v/1e9).toFixed(1)+'B';if(v>=1e6)return(v/1e6).toFixed(1)+'M';return v.toFixed(0);}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function newsTime(t){const d=new Date(t);if(!isNaN(d)){return d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',hour12:false});}return String(t||'').slice(17,22)||'刚刚';}
function openNewsReader(i){const n=newsCache[i];if(!n)return;document.getElementById('readerTitle').textContent=n.title;document.getElementById('readerTime').textContent=newsTime(n.time);document.getElementById('readerSummary').textContent=n.summary||n.title;document.getElementById('newsReader').classList.add('show');}
function closeNewsReader(e){if(e&&e.target.closest&&e.target.closest('.reader')&&e.target.className!=='reader-close')return;document.getElementById('newsReader').classList.remove('show');}
function renderNewsPanel(){const el=document.getElementById('newsSection');if(!el)return;
  if(!newsCache.length){el.innerHTML='<div class="news-card"><div class="news-head"><div class="news-title">📰 7×24 小时快讯</div><div class="news-live">实时</div></div><div class="news-empty">正在拉取并翻译快讯...</div></div>';return;}

}
async function loadNews(){renderNewsPanel();try{const r=await fetch('/api/news');const d=await r.json();newsCache=d.news||[];renderNewsPanel();}catch(e){const el=document.getElementById('newsSection');if(el)el.innerHTML='<div class="news-card"><div class="news-head"><div class="news-title">📰 7×24 小时快讯</div><div class="news-live">实时</div></div><div class="news-empty">快讯暂时不可用，稍后自动刷新。</div></div>';}}
// ====== Load ======
async function load(){if(isContractsLoading)return;isContractsLoading=true;renderCats();try{const r=await fetch(`/api/contracts?limit=1000&_=${Date.now()}`,{cache:'no-store'});const d=await r.json();allC=d.contracts;renderCats();doFilter();}catch(e){console.error(e);}finally{isContractsLoading=false;}}

if(atrPct>5)wait.push('ATR 波动异常，容易扫止损');
let act='观望',dir='观望',cls='neutral',entryLow=null,entryHigh=null,stop=null,firstTp=null,secondTp=null,rr=0;
if(side>0){entryLow=price-atrNow*0.25;entryHigh=price+atrNow*0.15;stop=Math.min(price-atrNow*1.6,support*0.995);const risk=Math.max(((entryLow+entryHigh)/2)-stop,price*0.002);firstTp=((entryLow+entryHigh)/2)+risk*1.6;secondTp=((entryLow+entryHigh)/2)+risk*2.4;rr=(firstTp-((entryLow+entryHigh)/2))/risk;}
if(side<0){entryLow=price-atrNow*0.15;entryHigh=price+atrNow*0.25;stop=Math.max(price+atrNow*1.6,resistance*1.005);const risk=Math.max(stop-((entryLow+entryHigh)/2),price*0.002);firstTp=((entryLow+entryHigh)/2)-risk*1.6;secondTp=((entryLow+entryHigh)/2)-risk*2.4;rr=(((entryLow+entryHigh)/2)-firstTp)/risk;}
if(totalScore<70)wait.push(`策略评分 ${totalScore}/100 低于 70，按规则观望`);
if(rr&&rr<1.5)wait.push(`盈亏比 ${rr.toFixed(1)} 低于 1:1.5`);
if(!stop||!firstTp||!secondTp)wait.push('交易计划缺少完整止损/止盈');
if(!wait.length&&side>0){act='做多';dir=totalScore>=85?'强烈看多':'看多';cls='bull';}
else if(!wait.length&&side<0){act='做空';dir=totalScore>=85?'强烈看空':'看空';cls='bear';}
else{entryLow=bl[lst];entryHigh=bu[lst];stop=null;firstTp=null;secondTp=null;rr=0;}

let shortProb=side<0&&!wait.length?clamp(Math.round(42+totalScore*0.52),5,88):side>0?clamp(Math.round(20-totalScore*0.08),5,35):clamp(Math.round(28+Math.max(0,-quantScore)*0.12),8,42);
let waitProb=clamp(100-longProb-shortProb,8,86);if(act==='观望'){waitProb=clamp(Math.max(waitProb,58),58,90);const remain=100-waitProb;longProb=Math.round(remain*(side>=0?0.55:0.45));shortProb=remain-longProb;}
const entryTxt=act==='观望'?`等待突破 $${fmt(resistance)} 或跌破 $${fmt(support)} 后重新评估`:`$${fmt(entryLow)} - $${fmt(entryHigh)}`;
const posTxt=act==='观望'?'0% - 10%，只做观察仓':atrPct>3?'10% - 15%，波动偏大':'15% - 25%，分批执行';
const levTxt=act==='观望'?'不建议加杠杆':atrPct>3?'1x - 2x':'2x - 3x，严格止损';
const riskTxt=act==='观望'?'中低':atrPct>3||totalScore<75?'高':totalScore>=85?'中低':'中';
const coreRaw=(act==='做多'?[...bull,...bear]:act==='做空'?[...bear,...bull]:[...wait,...bull,...bear]);
const core=coreRaw.slice(0,3);while(core.length<3){core.push(core.length===0?`当前评分 ${totalScore}/100，方向强度不足`:core.length===1?`支撑 $${fmt(support)}，压力 $${fmt(resistance)}`:`等待 4h/1h 与 15m/30m 重新共振`);}
